services:
  llm-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: edgar-ai-llm-gateway:latest
    ports:
      - '9000:9000'
    environment:
      # Forward your OpenAI key and provider setting to the container
      # The gateway honours both EDGAR_AI_OPENAI_API_KEY (used throughout the
      # project) and the standard OPENAI_API_KEY.  Forward the former so either
      # variable is available inside the container.
      - EDGAR_AI_OPENAI_API_KEY=${EDGAR_AI_OPENAI_API_KEY}
      - OPENAI_API_KEY=${EDGAR_AI_OPENAI_API_KEY}
      - LLM_PROVIDER=openai
# ---------------------------------------------------------------------
# Health-check: fail fast on wrong port mapping or server crash
# ---------------------------------------------------------------------
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:9000/healthz || exit 1"]
      interval: 10s
      retries: 3
      start_period: 5s
    # Code is baked into the image; no need to mount in production.  Uncomment
    # the volume below only when actively developing the gateway.
#    volumes:
#      - ./:/app:ro

# Example:
#   docker-compose up -d llm-gateway
#   docker-compose logs -f llm-gateway
